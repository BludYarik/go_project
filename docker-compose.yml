version: '3.8'

services:
  go-app:
    build:
      context: .
      dockerfile: Dockerfile.light
    container_name: go-backend
    environment:
      - REDIS_URL=redis:${REDIS_PORT} 
      - APP_MODE=${APP_ENV}
    depends_on:
      - redis
  
  nginx:
    image: nginx:alpine
    container_name: nginx-proxyy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./server.crt:/etc/nginx/ssl/server.crt:ro # сертификат
      - ./server.key:/etc/nginx/ssl/server.key:ro # ключ
    depends_on:
      - go-app

  redis:
    image: redis:alpine
    container_name: redis-db
    command: redis-server --port ${REDIS_PORT}
    volumes:
      - redis-data:/data

volumes:
  redis-data: