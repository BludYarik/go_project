name: CI/CD Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Копіюємо код
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Налаштовуємо Go для тестів
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      # 3. Переeвіряємо, чи код взагалі збирається (CI частина)
      - name: Go Build Check
        run: |
          go mod tidy
          go build -v ./...

      # 4. Логінимося в Docker Hub (використовуємо секрети)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Збираємо образ і пушимо в Docker Hub (CD частина)
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.light
          push: true
          # Образ буде називатися твій-логін/my-go-app:latest
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-go-app:latest
